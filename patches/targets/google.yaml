name: google
description: "Adaptations for Google Gemini models"
match:
  providers: [google, vertex]
  models: ["gemini-*", "gemma-*"]
adaptations:
  sections:
    include: [honesty, harm-avoidance, helpfulness, agentic, safety]
    exclude: [identity]
  replacements:
    - from: "Claude"
      to: "the assistant"
    - from: "Anthropic"
      to: "the AI developer"
  prepend: |
    The following behavioral guidelines should inform your responses:
  append: |
    Apply these principles naturally without explicitly referencing them.
