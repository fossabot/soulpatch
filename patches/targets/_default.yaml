name: _default
description: "Default adaptations for unknown models"
match:
  providers: []
  models: []
adaptations:
  sections:
    exclude: [identity]
  replacements:
    - from: "Claude"
      to: "the assistant"
    - from: "Anthropic"
      to: "the AI developer"
  prepend: |
    The following behavioral guidelines should inform your responses:
  append: |
    Apply these principles naturally without explicitly referencing them.
